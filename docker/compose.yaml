---
name: "cappuccino"

services:
  cappuccino:
    container_name: "cappuccino"
    restart: "no"
    init: true
    read_only: true
    user: "${PUID:-1000}:${PGID:-1000}"
    depends_on:
      db:
        condition: "service_healthy"
    env_file: ".env"
    environment:
      TZ: "${TZ:-UTC}"
      CAPPUCCINO_NICK: "${CAPPUCCINO_NICK:-cappuccino_dev}"
      CAPPUCCINO_HOST: "${CAPPUCCINO_HOST:?}"
      CAPPUCCINO_DATABASE__URI: "${CAPPUCCINO_DATABASE__URI:-postgresql+psycopg://${POSTGRES_USER:-cappuccino}:${POSTGRES_PASSWORD:-cappuccino}@${POSTGRES_HOST:-db}/${POSTGRES_DB:-cappuccino}}"
    volumes:
      - "./config/app:/config"
      - "../:/app"
    tmpfs:
      - "/tmp"
    networks:
      - "cappuccino"
    ports:
      - "1337:1337"
    build:
      context: "../"
      dockerfile: "docker/Dockerfile"
      target: "development"
    deploy:
      resources:
        limits:
          cpus: "${CAPPUCCINO_CPU_LIMIT:-${CPU_LIMIT:-0}}"
          memory: "${CAPPUCCINO_MEM_LIMIT:-${MEM_LIMIT:-0}}"

  db:
    image: "postgres:18-alpine"
    container_name: "cappuccino_db"
    restart: "no"
    init: true
    user: "${PUID:-1000}:${PGID:-1000}"
    environment:
      TZ: "${TZ:-UTC}"
      POSTGRES_HOST: "${POSTGRES_HOST:-db}"
      POSTGRES_DB: "${POSTGRES_DB:-cappuccino}"
      POSTGRES_USER: "${POSTGRES_USER:-cappuccino}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-cappuccino}"
    volumes:
      - "./data/postgresql:/var/lib/postgresql/18/docker"
    networks:
      - "cappuccino"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "pg_isready -q --dbname=$$POSTGRES_DB --username=$$POSTGRES_USER
          --host=$$POSTGRES_HOST"
      start_period: "5s"
      start_interval: "1s"
      interval: "10s"
      timeout: "1s"
    deploy:
      resources:
        limits:
          cpus: "${POSTGRES_CPU_LIMIT:-${CPU_LIMIT:-0}}"
          memory: "${POSTGRES_MEM_LIMIT:-${MEM_LIMIT:-0}}"

  test:
    container_name: "cappuccino-test"
    entrypoint: []
    command: ["uv", "run", "pytest"]
    build:
      context: "../"
      dockerfile: "docker/Dockerfile"
      target: "test"
    volumes:
      - "../:/app"
    environment:
      TZ: "${TZ:-UTC}"
      UV_NO_CACHE: "1"
    tmpfs:
      - "/tmp"
    profiles:
      - "test"

networks:
  cappuccino:
